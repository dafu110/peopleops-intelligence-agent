name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.api.txt httpx streamlit

      - name: Compile backend modules
        run: |
          python -m py_compile \
            backend/api.py backend/app.py \
            backend/core/config.py backend/core/auth.py backend/core/database.py backend/core/security.py \
            backend/core/audit.py backend/core/tools.py backend/core/pdf_utils.py backend/core/matcher.py \
            backend/core/workflow.py backend/core/rag_engine.py backend/core/tenancy.py \
            backend/core/connectors.py backend/core/ats.py backend/core/production_checks.py \
            backend/scripts/hash_password.py backend/scripts/check_public_hygiene.py

      - name: Run public repository hygiene checks
        run: python backend/scripts/check_public_hygiene.py

      - name: Run backend unit tests
        env:
          PYTHONPATH: backend
        run: python -m unittest discover -s backend/tests

      - name: Validate RAG eval dataset
        env:
          PYTHONPATH: backend
        run: python backend/scripts/evaluate_rag.py --check-dataset

      - name: Run RAG retrieval quality fixture gate
        env:
          PYTHONPATH: backend
        run: python backend/scripts/evaluate_rag.py --fixture-eval

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Run frontend UI flow smoke tests
        working-directory: frontend
        run: pnpm test:ui

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  rag-real-eval:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install full backend RAG dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run real RAG retrieval quality gate
        env:
          PYTHONPATH: backend
          RAG_MIN_PASS_RATE: "1.0"
          RAG_MIN_KEYWORD_COVERAGE: "0.5"
          RAG_MIN_CITATION_CORRECTNESS: "0.8"
        run: python backend/scripts/evaluate_rag.py
