services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../var/runtime:/app/var/runtime
      - ../var/chroma:/app/var/chroma
      - ../data:/app/data

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
