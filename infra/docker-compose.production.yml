services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: peopleops
      POSTGRES_USER: peopleops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peopleops -d peopleops"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    env_file:
      - ../.env
    environment:
      ENTERPRISE_MODE: "true"
      REQUIRE_ACCESS_PASSWORD: "false"
      TRUSTED_SSO_ENABLED: "true"
      DATABASE_BACKEND: postgresql
      DATABASE_URL: postgresql://peopleops:${POSTGRES_PASSWORD}@postgres:5432/peopleops
      VECTOR_BACKEND: qdrant
      VECTOR_STORE_URL: http://qdrant:6333
      OBJECT_STORAGE_URI: s3://peopleops-artifacts
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:?set DEFAULT_TENANT_ID}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
